name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - id: discover
        name: Discover flake targets
        run: |
          nixos=$(nix eval --json '.#nixosConfigurations' --apply 'builtins.attrNames')
          home=$(nix eval --json '.#homeConfigurations'  --apply 'builtins.attrNames')
          targets=$(jq -rn \
            --argjson nixos "$nixos" \
            --argjson home "$home" \
            '
              ($nixos[] | "nixosConfigurations.\(.).config.system.build.toplevel"),
              ($home[]  | "homeConfigurations.\(.).activationPackage")
            ')
          {
            echo "targets<<EOF"
            echo "$targets"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Evaluate targets
        run: |
          fail=0
          while IFS= read -r attr; do
            echo "::group::$attr"
            nix eval --raw ".#$attr.drvPath" || fail=1
            echo
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.targets }}"
          exit $fail
