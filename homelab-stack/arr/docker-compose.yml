services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - TZ=${TZ}
      - PUID=${UID}
      - PGID=${GID}
    ports:
      - "9091:9091/tcp" # forward 9091 (transmission) to host
      # - "7878:7878/tcp"
      - "8989:8989/tcp"
      - "9696:9696/tcp"
    volumes:
      - ${WG_CONF_PATH}:/config/wg_confs/wg0.conf
      - /lib/modules:/lib/modules
    restart: unless-stopped
    healthcheck: # check if the wg is running
      test: ["CMD-SHELL", "ping -c1 www.google.com"]
      interval: 1m
      retries: 5
      start_period: 5s
      timeout: 10s

