  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: "service:wireguard" # runs using the wireguard networking
    ports:
      - "7878:7878/tcp"
    depends_on:
      wireguard:
        condition: service_healthy # waits until wireguard is started
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - radarr-config:/config
      - ${MEDIA_DIR_PATH}:/media
      - ${DOWNLOADS_DIR_PATH}:/downloads
    restart: unless-stopped

